<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PM 转型成长计划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1410; --paper: #f5f0e8; --accent: #c84b2f; --gold: #d4a843; --muted: #8a7d6e; --green: #3a7d44; --card-bg: #faf7f2; --border: #d9d0c0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; min-height: 100vh; padding: 0 0 80px 0; }
  
  .header { background: var(--ink); color: var(--paper); padding: 10px 20px 0; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .header-title { font-family: 'Noto Serif SC', serif; font-size: 14px; letter-spacing: 1px; }
  .header-subtitle { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--gold); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; }
  .date-badge { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(245,240,232,0.5); text-align: right; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0; padding-bottom:8px; }
  .progress-bar-wrap { flex: 1; height: 2px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.6s ease; }
  .progress-text { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--gold); white-space: nowrap; }
  
  .tab-nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--card-bg); position: sticky; z-index: 10; }
  .tab-btn { padding: 16px 20px; font-size: 13px; font-family: 'Noto Sans SC', sans-serif; font-weight: 400; border: none; background: none; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; letter-spacing: 0.5px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .content { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
  .section-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-hd h2 { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; }
  .section-hd-line { flex: 1; height: 1px; background: var(--border); }
  
  .day-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; transition: box-shadow 0.2s; }
  .day-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .day-label { display: flex; align-items: center; gap: 14px; }
  .day-num { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #2f64c8; letter-spacing: 2px; background: rgba(47,100,200,0.08); padding: 4px 10px; border-radius: 2px; }
  .day-title { font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--ink); }
  .day-body { padding: 24px; display: none; }
  .day-body.open { display: block; animation: slideDown 0.25s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .knowledge-block { border-left: 3px solid #2f64c8; padding: 16px 20px; background: rgba(47,100,200,0.03); margin-bottom: 20px; border-radius: 0 2px 2px 0; }
  .knowledge-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #2f64c8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .knowledge-p { font-size: 13px; line-height: 1.8; color: #3a3028; margin-bottom: 12px; }
  .knowledge-p strong { color: #2f64c8; font-weight: 500; }
  
  .reflection-block { background: rgba(26,20,16,0.03); border: 1px solid var(--border); border-radius: 2px; padding: 16px 20px; margin-top: 20px; }
  .reflection-input { width: 100%; border: 1px solid var(--border); background: white; padding: 12px; font-family: 'Noto Sans SC', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; min-height: 80px; outline: none; border-radius: 1px; transition: border-color 0.2s; margin-top: 10px; }
  .reflection-input:focus { border-color: var(--accent); }
  .check-row { display: flex; justify-content: flex-end; margin-top: 20px; gap: 10px; align-items: center; }
  .check-btn { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 24px; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; transition: all 0.15s; border-radius: 1px; }
  .check-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .check-btn.checked { background: var(--green); border-color: var(--green); color: white; }
  
  .keypoints-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .keypoint { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .keypoint-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; background: #9b59b6; }
  .keypoint-text { font-size: 13px; line-height: 1.75; color: #3a3028; }

  .weekly-block { background: var(--ink); color: var(--paper); padding: 24px; border-radius: 2px; margin-top: 32px; }
  .weekly-input { width: 100%; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.6); padding: 10px; font-family: 'Noto Sans SC', sans-serif; font-size: 12px; color: var(--ink); resize: vertical; min-height: 70px; outline: none; border-radius: 2px; margin-top: 10px; }
  .weekly-check-btn { margin-top: 16px; font-family: 'Space Mono', monospace; font-size: 10px; padding: 8px 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; }
  .weekly-check-btn.done { background: var(--gold); color: var(--ink); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">AI PM 转型成长计划</div>
      <div class="header-subtitle">Bank PM → AI PM · 每日打卡</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
      <div class="date-badge" id="dateBadge"></div>
      <span id="syncStatus" style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:#d4a843;">连接数据中...</span>
    </div>
  </div>
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="mainProgress" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">今日成就载入中</div>
  </div>
</div>

<div class="tab-nav" style="position:fixed;top:var(--header-h,72px);left:0;right:0;">
  <button class="tab-btn active" onclick="switchTab('knowledge')">📚 每日知识</button>
  <button class="tab-btn" onclick="switchTab('interview')">🎯 每日面经</button>
  <button class="tab-btn" onclick="switchTab('weekly')">📌 周目标</button>
</div>

<div class="tab-panel active content" id="tab-knowledge">
  <div class="section-hd">
    <h2>每日底层知识基石</h2>
    <div class="section-hd-line"></div>
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">Feynman 学习法</span>
  </div>
  <div id="knowledge-container"></div>
</div>

<div class="tab-panel content" id="tab-interview">
  <div class="section-hd">
    <h2>每日面经题</h2>
    <div class="section-hd-line"></div>
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">全真模拟 · 无限生成</span>
  </div>
  <div id="interview-container"></div>
</div>

<div class="tab-panel content" id="tab-weekly">
  <div class="section-hd">
    <h2>周目标</h2>
    <div class="section-hd-line"></div>
  </div>
  <div id="weekly-container"></div>
</div>

<script>
  // ── 核心配置 ──────────────────────
  const API_BASE = 'https://aipm-api.rutingzhuo05.workers.dev';
  const FEISHU = { 
    appId: 'cli_a9248a4017f8dcb3', 
    baseId: 'KiBzbaG9patb0isx4oGcUbPWnOe', 
    tableId: 'tblX1j2AaKiDalFp',             
    knowledgeTableId: 'tblQMY5pYyvLnpI8',    
    interviewTableId: 'tblrik3BihWl2tIt',    
    weeklyTableId: 'tblYzYS7D7vEqNdf' 
  };

  const now = new Date(); const offset = now.getTimezoneOffset() * 60000;
  const localISOTime = (new Date(now.getTime() - offset)).toISOString().slice(0, -1);
  const todayStr = localISOTime.slice(0, 10);
  const todayTimestamp = new Date(todayStr + 'T00:00:00+08:00').getTime();
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  function lsave(key, val) { try { localStorage.setItem('aipm_' + key, JSON.stringify(val)); } catch(e){} }
  function lload(key, def) { try { const v = localStorage.getItem('aipm_' + key); return v !== null ? JSON.parse(v) : def; } catch(e){ return def; } }

  const CORRECT_PWD = 'ruting2026';
  let isAuthorized = lload('authorized', false);
  function checkGlobalAuth() {
    if (isAuthorized) return true;
    const input = prompt('🔐 AI PM 成长空间\n请输入专属打卡密码：');
    if (input === CORRECT_PWD) { isAuthorized = true; lsave('authorized', true); return true; } 
    else { document.body.innerHTML = '<h2 style="text-align:center;margin-top:20vh;color:#c84b2f;">🚧 无访问权限</h2>'; return false; }
  }

  function setSyncStatus(status, msg) {
    const el = document.getElementById('syncStatus'); if (!el) return;
    const colors = { syncing: '#d4a843', ok: '#3a7d44', err: '#c84b2f', offline: '#8a7d6e' };
    el.style.color = colors[status] || '#8a7d6e'; el.textContent = msg;
  }

  let state = lload('state', { done: {}, reflections: {}, weekly: {}, aiComments: {} });
  let token = null; let syncTimeout = null;
  let todayRecordId = lload('recordId_' + todayStr, null);
  let interviewRecordIds = lload('interviewRecordIds_' + todayStr, {});
  let knowledgeRecordIds = lload('knowledgeRecordIds_' + todayStr, {});
  let learnedConcepts = lload('learnedConcepts', []);

  function getKnowledgeCache() {
    let cached = lload('knowledge_' + todayStr, []);
    return Array.isArray(cached) ? cached : [];
  }
  function getInterviewCache() {
    let cached = lload('questions_' + todayStr, []);
    return Array.isArray(cached) ? cached : [];
  }

  // ── API 封装 ───────────────────
  async function askGemini(prompt, fallbackData) {
  try {
    const strictPrompt = prompt + "\n【系统强制指令】：请严格输出合法 JSON。不允许真实换行符，需换行用 '\\n'。禁止 Markdown 标记。";
    
    // 🚨 这里的 v1 路径要确保没有空格
    const res = await fetch(API_BASE + '/gemini/v1/models/gemini-1.5-flash:generateContent', {
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        contents: [{ parts: [{ text: strictPrompt }] }], 
        generationConfig: { 
          temperature: 0.7, 
          max_output_tokens: 4000,        // 🚨 修正：使用下划线命名
          response_mime_type: "application/json" // 🚨 修正：使用下划线命名
        } 
      })
    });

    const data = await res.json();

    // 如果报错，直接在控制台输出 Google 给的具体原因，方便我们定位
    if (!res.ok) {
      console.error("Gemini 返回了错误:", data.error ? data.error.message : data);
      return fallbackData;
    }

    if (!data.candidates) return fallbackData; 
    
    const text = data.candidates[0].content.parts.map(p => p.text).join('');
    // 清洗可能存在的 Markdown 格式
    const cleanJson = text.replace(/```json/gi, '').replace(/```/g, '').trim();
    return JSON.parse(cleanJson);

  } catch(e) { 
    console.error("解析 JSON 失败:", e);
    return fallbackData; 
  }
}

  async function askGeminiText(prompt, fallbackText) {
  try {
    // 🚨 检查点 1：确保 API_BASE 结尾没有多余斜杠，模型名没有空格
    const url = `${API_BASE}/gemini/v1/models/gemini-1.5-flash:generateContent`;

    const res = await fetch(url, {
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        contents: [{ parts: [{ text: prompt }] }], 
        generationConfig: { 
          temperature: 0.7 
          // 这里不需要 response_mime_type，因为是纯文本对话
        } 
      })
    });

    const data = await res.json();

    // 🚨 检查点 2：如果报错，把错误信息打出来，别只返回 fallback
    if (!res.ok || data.error) {
      console.error("Gemini Text API Error:", data.error || data);
      return `⚠️ AI 暂时无法点评: ${data.error?.message || '未知错误'}`;
    }

    if (data.candidates && data.candidates[0].content) {
      return data.candidates[0].content.parts.map(p => p.text).join('').trim();
    }
    
    return fallbackText;
  } catch(e) { 
    console.error("askGeminiText 运行崩溃:", e);
    return fallbackText; 
  }
}

  async function feishuAPI(method, path, body) {
    if (!token) {
      const res = await fetch(API_BASE + '/feishu/auth/v3/tenant_access_token/internal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_id: FEISHU.appId }) });
      const data = await res.json();
      if (data.tenant_access_token) { token = data.tenant_access_token; setTimeout(() => { token = null; }, 110*60*1000); }
    }
    const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + '/feishu' + path, opts);
    const result = await res.json();
    if (result.code !== 0) console.error('Feishu API Details:', result);
    return result;
  }

  // ── 知识点模块 ──────────────────────────────
  async function fetchOneKnowledge() {
  const domains = ['模型原理', 'RAG与向量数据库', 'Agent架构', '数据与标注', 'AI成本与性能', '合规与安全'];
  const randomDomain = domains[Math.floor(Math.random() * domains.length)];
  const usedStr = (typeof learnedConcepts !== 'undefined' && learnedConcepts.length > 0) ? `\n避开：${learnedConcepts.slice(-20).join(',')}` : '';

  const prompt = `你是一位AI产品总监。请从【${randomDomain}】领域挑1个底层概念。${usedStr}\n请严格按JSON返回：{"concept": "名称", "eli5": "通俗解释", "product_value": "具体价值", "interview_hook": "面试包装", "domain": "${randomDomain}"}`;

  const fallback = { concept: "暂无数据", eli5: "API暂时无法连接", product_value: "-", interview_hook: "-", domain: "Error" };

  try {
    const data = await askGemini(prompt, fallback);
    
    // 【关键修复】校验 data 是否有效且包含必要字段
    if (!data || !data.concept || data.concept === "暂无数据") {
      console.error("AI 返回数据无效:", data);
      return null; // 返回 null，让调用方知道失败了
    }
    
    if (typeof learnedConcepts !== 'undefined' && !learnedConcepts.includes(data.concept)) {
      learnedConcepts.push(data.concept);
      lsave('learnedConcepts', learnedConcepts);
    }
    return data;
  } catch (e) {
    console.error("fetchOneKnowledge Error:", e);
    return null;
  }
}




  async function initKnowledge() {
    let arr = getKnowledgeCache();
    if (arr.length === 0) { 
      document.getElementById('knowledge-container').innerHTML = '<div style="padding:40px;text-align:center;font-size:12px;color:var(--muted);">正在翻阅 AI 词典...</div>';
      const data = await fetchOneKnowledge(); 
      arr.push(data); lsave('knowledge_' + todayStr, arr); 
    }
    renderKnowledge();
  }

  async function addMoreKnowledge() {
    const btn = document.getElementById('btn-add-knowledge');
    if(btn) { btn.textContent = '⏳ 正在拼命翻阅 AI 词典...'; btn.disabled = true; }
    const data = await fetchOneKnowledge();
    let arr = getKnowledgeCache(); arr.push(data); lsave('knowledge_' + todayStr, arr);
    renderKnowledge();
  }

  function renderKnowledge() {
  const arr = getKnowledgeCache() || [];
  const container = document.getElementById('knowledge-container');
  
  // 【关键修复】过滤掉无效数据，只渲染真正有内容的概念
  const validArr = arr.filter(data => data && data.concept && data.concept !== "暂无数据");

  if (validArr.length === 0) {
    container.innerHTML = `
      <div style="padding:80px 20px; text-align:center;">
        <div style="font-size:24px; margin-bottom:16px;">🔍</div>
        <div style="color:var(--muted); font-size:13px;">当前没有可显示的知识点</div>
        <button class="check-btn" style="margin-top:20px;" onclick="addMoreKnowledge()">尝试重新加载</button>
      </div>`;
  } else {
    container.innerHTML = validArr.map((data, i) => {
      const id = 'k' + i;
      const aiCommentText = (state.aiComments && state.aiComments[id]) ? state.aiComments[id].replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') : '';
      const isDone = state.done[id]; 
      const isOpen = i === validArr.length - 1; // 默认展开最后一个

      return `
      <div class="day-card">
        <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <div class="day-label">
            <span class="day-num">核心概念 ${i+1}</span>
            <span style="background:var(--accent); color:white; padding:2px 6px; border-radius:4px; font-size:10px; margin:0 8px;">${data.domain || '通用'}</span>
            <span class="day-title">${data.concept}</span>
          </div>
        </div>
        <div class="day-body ${isOpen ? 'open' : ''}">
          <div class="knowledge-block">
            <div class="knowledge-label">💡 概念通俗解析</div>
            <div class="knowledge-p"><strong>🤔 到底是个啥？</strong><br/>${data.eli5}</div>
            <div class="knowledge-p"><strong>💼 核心产品价值：</strong><br/>${data.product_value}</div>
            <div class="knowledge-p"><strong>🎯 面试怎么聊：</strong><br/>${data.interview_hook}</div>
          </div>
          <div class="reflection-block">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
              <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;">✍️ 费曼总结输出</span>
              <button class="check-btn" style="padding:4px 12px; font-size:10px;" id="btn-ai-${id}" onclick="getKnowledgeEvaluation('${id}', '${data.concept}')">🤖 获取点评</button>
            </div>
            <textarea class="reflection-input" id="reflect-${id}" placeholder="我的理解是..." oninput="saveReflect('${id}', this.value)">${state.reflections[id]||''}</textarea>
            <div id="ai-comment-${id}" style="margin-top:12px; display:${aiCommentText ? 'block' : 'none'}; background:rgba(200,75,47,0.06); border-left:3px solid var(--accent); padding:12px;">
              <div id="ai-comment-text-${id}" style="font-size:12px;line-height:1.8;color:var(--ink);">${aiCommentText}</div>
            </div>
          </div>
          <div class="check-row">
            <button class="check-btn ${isDone ? 'checked' : ''}" id="btn-done-${id}" onclick="toggleKnowledgeDone('${id}')">${isDone ? '撤销完成' : '标记完成 ✓'}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  
  // 添加底部的按钮
  container.innerHTML += `<div style="text-align:center; margin: 30px 0;"><button id="btn-add-knowledge" class="check-btn" style="border-color: #2f64c8; color: #2f64c8; padding: 12px 32px; font-size:13px;" onclick="addMoreKnowledge()">➕ 觉得没吃饱？再学一个概念！</button></div>`;
}
  async function getKnowledgeEvaluation(id, concept) {
    const userAnswer = state.reflections[id] || '';
    if (userAnswer.trim().length < 5) { alert('请先写下总结再获取点评哦！'); return; }
    const btn = document.getElementById('btn-ai-' + id);
    const commentBox = document.getElementById('ai-comment-' + id); const commentText = document.getElementById('ai-comment-text-' + id);

    btn.textContent = '🤖 思考中...'; btn.disabled = true;
    commentBox.style.display = 'block'; commentText.innerHTML = '<span style="color:var(--muted)">正在评估你的费曼总结...</span>';

    const prompt = `你是资深AI产品导师。候选人正在用费曼技巧解释概念【${concept}】。解释是："${userAnswer}"。请点评解释是否通俗、准确，给出建议。纯文本输出。`;
    const aiComment = await askGeminiText(prompt, 'AI 思考开了小差，请重试');

    if (!state.aiComments) state.aiComments = {}; state.aiComments[id] = aiComment; lsave('state', state);
    commentText.innerHTML = aiComment.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    btn.textContent = '重新获取点评'; btn.disabled = false;
    
    if (!state.done[id]) { state.done[id] = true; updateProgress(); renderKnowledge(); }
    scheduleSync(id, 'knowledge');
  }

  function toggleKnowledgeDone(id) {
    const val = document.getElementById('reflect-' + id).value.trim();
    if (!state.done[id] && val.length < 5) { alert("请至少写一句总结哦！"); return; }
    state.done[id] = !state.done[id];
    renderKnowledge(); updateProgress(); scheduleSync(id, 'knowledge');
  }

  // ── 面试题模块 ────────────────────────────────────────────────
  const Q_CATEGORIES = ['AI底层逻辑与概念', 'AI项目实战落地', '产品核心方法论', '业务结合与提效'];

  async function fetchInterviewQuestions(count = 2) {
    const category = Q_CATEGORIES[Math.floor(Date.now() / 86400000) % Q_CATEGORIES.length];
    const cached = getInterviewCache();
    const usedStr = cached.length > 0 ? `\n避开已出题：\n${cached.map(x=>x.title).slice(-10).join('\n')}` : '';
    const prompt = `你是一个严厉的AI产品总监。请为转型AI PM的候选人出 ${count} 道面试真题。类别：${category} ${usedStr}\n请严格按JSON数组返回，格式：\n[{"title": "...", "framework": "...", "knowledge": "..."}]`;
    const fallback = count === 1
      ? [{ title: '如果在上线前一天发现大模型偶发严重幻觉，你怎么办？', framework: '① 兜底策略降级 ② 评估影响范围 ③ 紧急拦截规则', knowledge: '幻觉风控与应急' }]
      : [{ title: '谈谈对Agent核心组件的理解？', framework: '① 规划(Planning) ② 记忆(Memory) ③ 工具(Tools)', knowledge: 'Agent' }, { title: 'RAG和微调(SFT)在业务上如何选型？', framework: '① 数据时效性 ② 成本 ③ 领域专业度', knowledge: '技术选型' }];

    let qs = await askGemini(prompt, fallback);
    if (!Array.isArray(qs)) qs = fallback;
    return qs.map(q => ({ id: 'q' + Math.random().toString(36).substr(2, 6), category, ...q }));
  }

  async function initInterview() {
    let arr = getInterviewCache();
    if (arr.length === 0) {
      document.getElementById('interview-container').innerHTML = '<div style="padding:40px;text-align:center;font-size:12px;color:var(--muted);">正在邀请大厂面试官入场出题...</div>';
      arr = await fetchInterviewQuestions(2);
      lsave('questions_' + todayStr, arr);
    }
    renderInterview();
  }

  async function addMoreInterview() {
    const btn = document.getElementById('btn-add-interview');
    if (btn) { btn.textContent = '⏳ 正在向面试官申请新题目...'; btn.disabled = true; }
    const newQs = await fetchInterviewQuestions(1);
    let arr = getInterviewCache();
    arr = arr.concat(newQs);
    lsave('questions_' + todayStr, arr);
    renderInterview();
  }

  async function getAIEvaluation(qid) {
    const userAnswer = state.reflections[qid] || '';
    if (userAnswer.trim().length < 10) { alert('写点答案再让AI点评吧！'); return; }
    const q = getInterviewCache().find(x => x.id === qid);
    const btn = document.getElementById('btn-ai-' + qid);
    const commentBox = document.getElementById('ai-comment-' + qid); const commentText = document.getElementById('ai-comment-text-' + qid);
    
    btn.textContent = '🤖 思考中...'; btn.disabled = true;
    commentBox.style.display = 'block'; commentText.innerHTML = '<span style="color:var(--muted)">正在生成专业点评...</span>';

    const prompt = `你是严厉的AI PM面试官。题：${q.title}。候选人答案：${userAnswer}。请客观点评亮点与不足，给出建议。纯文本输出。`;
    const aiComment = await askGeminiText(prompt, 'AI 思考开了小差，请重试');
    
    if (!state.aiComments) state.aiComments = {}; state.aiComments[qid] = aiComment; lsave('state', state);
    commentText.innerHTML = aiComment.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    btn.textContent = '重新获取点评'; btn.disabled = false;
    
    if (!state.done[qid]) { state.done[qid] = true; updateProgress(); renderInterview(); }
    scheduleSync(qid, 'interview');
  }

  function renderInterview() {
    const arr = getInterviewCache();
    const container = document.getElementById('interview-container');
    container.innerHTML = arr.map((q, i) => {
      const aiCommentText = (state.aiComments && state.aiComments[q.id]) ? state.aiComments[q.id].replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') : '';
      const isDone = state.done[q.id]; const isOpen = i === arr.length - 1;
      return `
      <div class="day-card">
        <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <div class="day-label"><span class="day-num" style="background:rgba(155,89,182,0.08);color:#9b59b6;">题目 ${i+1}</span><span class="day-title">${q.title}</span></div>
        </div>
        <div class="day-body ${isOpen?'open':''}">
          <div class="keypoints"><div class="keypoints-title">📌 答题框架</div>${q.framework.split('\n').map(f => `<div class="keypoint"><div class="keypoint-dot"></div><div class="keypoint-text">${f.replace(/^[①②③④]/,'').trim()}</div></div>`).join('')}</div>
          <div class="reflection-block" style="background:rgba(155,89,182,0.03);border-color:rgba(155,89,182,0.2);">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
              <span style="font-size:10px;color:#9b59b6;">✍️ 我的答案</span>
              <button class="check-btn" style="padding:4px 12px; font-size:10px; border-color:#9b59b6; color:#9b59b6;" id="btn-ai-${q.id}" onclick="getAIEvaluation('${q.id}')">🤖 获取点评</button>
            </div>
            <textarea class="reflection-input" id="reflect-${q.id}" oninput="saveReflect('${q.id}', this.value)">${state.reflections[q.id]||''}</textarea>
            <div id="ai-comment-${q.id}" style="margin-top:12px; display:${aiCommentText ? 'block' : 'none'}; background:rgba(155,89,182,0.06); border-left:3px solid #9b59b6; padding:12px;">
              <div style="font-size:9px;color:#9b59b6;margin-bottom:6px;">AI EVALUATION</div>
              <div id="ai-comment-text-${q.id}" style="font-size:12px;line-height:1.8;">${aiCommentText}</div>
            </div>
          </div>
          <div class="check-row">
            <button class="check-btn ${isDone ? 'checked' : ''}" id="btn-done-${q.id}" onclick="toggleInterviewDone('${q.id}')">${isDone ? '撤销完成' : '标记完成 ✓'}</button>
          </div>
        </div>
      </div>`;
    }).join('') + `
      <div style="text-align:center; margin: 30px 0;">
        <button id="btn-add-interview" class="check-btn" style="border-color: #9b59b6; color: #9b59b6; padding: 12px 32px; font-size:13px;" onclick="addMoreInterview()">➕ 觉得不够虐？再来一道面试题！</button>
      </div>
    `;
  }

  function toggleInterviewDone(qid) {
    state.done[qid] = !state.done[qid];
    renderInterview(); updateProgress(); scheduleSync(qid, 'interview');
  }

  // ── 周目标 (防崩溃修复) ────────────────────────────────────────────────
  async function generateWeekly() {
    const weekNum = Math.floor((new Date(todayStr) - new Date('2026-03-10')) / 86400000 / 7) + 1;
    const cacheKey = 'weekly_w' + weekNum;
    let weekly = lload(cacheKey, null);
    
    // 🚨 修复 1：防旧缓存数据结构崩溃。如果缓存里没有 goals，强制清除重头拉取
    if (!weekly || !weekly.goals || !Array.isArray(weekly.goals)) {
      document.getElementById('weekly-container').innerHTML = '<div style="padding:40px;text-align:center;font-size:12px;color:var(--muted);">正在规划本周突击目标...</div>';
      weekly = await askGemini(`AI PM转型教练，为第${weekNum}周生成3个学习目标。按JSON返回:{"theme":"..","goals":[{"title":"..","desc":".."}]}`, { theme: 'AI PM 知识突击', goals: [{ title: '打通RAG基础', desc: '搞懂向量检索原理' }, { title: '熟悉Agent机制', desc: '拆解一次工具调用流程' }] });
      lsave(cacheKey, weekly);
    }
    
    const c = document.getElementById('weekly-container');
    if (c && weekly && weekly.goals) {
      c.innerHTML = weekly.goals.map((g, i) => {
        const key = `w${weekNum}_${i+1}`; const isDone = state.weekly[key];
        return `<div class="weekly-block">
          <div style="font-size:10px;color:var(--gold);margin-bottom:8px;">📌 目标 ${i+1}</div>
          <div style="font-size:16px;margin-bottom:8px;">${g.title}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:16px;line-height:1.6;">${g.desc}</div>
          <textarea class="weekly-input" placeholder="贴入笔记..." oninput="state.reflections['${key}']=this.value;lsave('state',state);">${state.reflections[key]||''}</textarea>
          <button class="weekly-check-btn ${isDone?'done':''}" onclick="state.weekly['${key}']=!state.weekly['${key}'];lsave('state',state);this.classList.toggle('done');">标记完成</button>
        </div>`;
      }).join('');
    }
  }

  // ── 三表同步路由 (飞书语法强兼容) ────────────────────────────────────────────────
  function saveReflect(id, val) { state.reflections[id] = val; lsave('state', state); scheduleSync(); }

  function scheduleSync(itemId, type) {
    setSyncStatus('syncing', '正在分发数据...');
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(() => { 
      syncMainTracker(); 
      if (type === 'knowledge' && itemId) syncSingleKnowledge(itemId);
      if (type === 'interview' && itemId) syncSingleInterview(itemId);
    }, 1500);
  }

  async function syncMainTracker() {
    let kCount = 0; getKnowledgeCache().forEach((_, i) => { if (state.done['k'+i]) kCount++; });
    let qCount = 0; getInterviewCache().forEach(q => { if (state.done[q.id]) qCount++; });
    
    const fields = { '日期': todayTimestamp, '今日学习概念数': kCount, '今日答题数': qCount };
    const path = `/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.tableId}/records`;
    
    try {
      if (!todayRecordId) {
        const d = await feishuAPI('GET', `${path}?filter=${encodeURIComponent(`CurrentValue.[日期]=${todayTimestamp}`)}`);
        if (d.data?.items) todayRecordId = d.data.items[0].record_id;
      }
      if (todayRecordId) await feishuAPI('PUT', `${path}/${todayRecordId}`, { fields });
      else { const r = await feishuAPI('POST', path, { fields }); if (r.data?.record) { todayRecordId = r.data.record.record_id; lsave('recordId_'+todayStr, todayRecordId); } }
      setSyncStatus('ok', '三表已同步 ✓');
    } catch(e) { setSyncStatus('err', '主表同步失败'); }
  }

  async function syncSingleKnowledge(id) {
    const idx = parseInt(id.replace('k', ''));
    const data = getKnowledgeCache()[idx]; if (!data) return;

    // 🚨 修复：加上对应的 Emoji 表情，与飞书表头一字不差
    const fields = { 
      '知识点名称': data.concept, 
      '学习日期': todayTimestamp, 
      '🤔 通俗解释': data.eli5, 
      '💼 产品价值': data.product_value, 
      '🎯 面试怎么聊': data.interview_hook 
    };
    if (state.reflections[id]) fields['✍️ 我的费曼总结'] = state.reflections[id];
    if (state.aiComments && state.aiComments[id]) fields['🤖 导师点评'] = state.aiComments[id];

    const path = `/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.knowledgeTableId}/records`;
    try {
      if (!knowledgeRecordIds[id]) {
        const safeConcept = data.concept.replace(/"/g, ''); 
        const d = await feishuAPI('GET', `${path}?filter=${encodeURIComponent(`CurrentValue.[知识点名称]="${safeConcept}"`)}`);
        if (d.data?.items) knowledgeRecordIds[id] = d.data.items[0].record_id;
      }
      let r;
      if (knowledgeRecordIds[id]) r = await feishuAPI('PUT', `${path}/${knowledgeRecordIds[id]}`, { fields });
      else r = await feishuAPI('POST', path, { fields });
      
      if (r.code && r.code !== 0) {
        console.error('【知识库同步失败】飞书报错:', r.msg);
        setSyncStatus('err', '数据格式被飞书拒收');
      } else {
        knowledgeRecordIds[id] = r.data.record.record_id; 
        lsave('knowledgeRecordIds_'+todayStr, knowledgeRecordIds);
      }
    } catch(e) { console.error('【知识库同步异常】', e); }
  }
  
  async function syncSingleInterview(qid) {
    const q = getInterviewCache().find(x => x.id === qid); if (!q) return;
    const fields = { '题目内容': q.title, '生成日期': todayTimestamp, '所属类别': q.category, '考察知识点': q.knowledge, '答题框架': q.framework };
    if (state.reflections[qid]) fields['我的答案'] = state.reflections[qid];
    if (state.aiComments && state.aiComments[qid]) fields['严厉点评'] = state.aiComments[qid];

    const path = `/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.interviewTableId}/records`;
    try {
      if (!interviewRecordIds[qid]) {
        const safeTitle = q.title.replace(/"/g, '');
        const d = await feishuAPI('GET', `${path}?filter=${encodeURIComponent(`CurrentValue.[题目内容]="${safeTitle}"`)}`);
        if (d.data?.items) interviewRecordIds[qid] = d.data.items[0].record_id;
      }
      let r;
      if (interviewRecordIds[qid]) r = await feishuAPI('PUT', `${path}/${interviewRecordIds[qid]}`, { fields });
      else r = await feishuAPI('POST', path, { fields });
      
      if (r.code && r.code !== 0) {
        console.error('【面经同步失败】飞书报错:', r.msg);
        setSyncStatus('err', '面经同步被拒收');
      } else {
        interviewRecordIds[qid] = r.data.record.record_id; 
        lsave('interviewRecordIds_'+todayStr, interviewRecordIds);
      }
    } catch(e) { console.error('【面经库同步异常】', e); }
  }

  // ── 进度与交互 ─────────────────────────────────────────────
  function updateProgress() {
    let kCount = 0; getKnowledgeCache().forEach((data, i) => { if (state.done['k'+i]) kCount++; });
    let qCount = 0; getInterviewCache().forEach(q => { if (state.done[q.id]) qCount++; });
    let total = kCount + qCount;
    document.getElementById('mainProgress').style.width = (total > 0 ? '100%' : '0%');
    document.getElementById('progressText').textContent = `今日斩获：${kCount} 概念 · ${qCount} 面经`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel, .tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function adjustLayout() {
    const header = document.querySelector('.header'); const tabNav = document.querySelector('.tab-nav');
    if (!header || !tabNav) return;
    document.documentElement.style.setProperty('--header-h', header.offsetHeight + 'px');
    tabNav.style.top = header.offsetHeight + 'px';
    document.body.style.paddingTop = (header.offsetHeight + tabNav.offsetHeight) + 'px';
  }
  window.addEventListener('resize', adjustLayout);

  async function init() {
    if (!checkGlobalAuth()) return;
    adjustLayout(); 
    initKnowledge(); 
    initInterview(); // 启动面经按需生成
    generateWeekly(); // 启动周目标渲染
    updateProgress();
  }

  init();
</script>
</body>
</html>
